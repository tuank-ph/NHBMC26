<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Mạch Lỗi - Logic Game</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #FFFFFF;
            --accent-color: #FFD700;
            --off-color: #333333;
            --on-color: #00FFCC;
            --highlight-color: #FF3366;
            --theory-bg: #1e1e1e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .header-container {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; max-width: 600px;
            margin-bottom: 15px; border-bottom: 3px solid var(--text-color); padding-bottom: 15px;
        }

        h1 { font-size: 1.8rem; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        .school-logo { width: 70px; background-color: white; padding: 5px; border-radius: 8px; }

        .info-panel {
            background-color: #222; border-left: 5px solid var(--on-color);
            padding: 15px; width: 100%; max-width: 570px; margin-bottom: 20px; font-size: 0.95rem;
        }

        .stats-board {
            font-size: 1.1rem; margin-bottom: 20px; display: flex; gap: 20px;
            background-color: #222; padding: 10px 20px; border-radius: 10px; border: 2px solid var(--text-color);
        }

        #game-board { 
            display: grid; gap: 10px; margin-bottom: 20px; padding: 15px;
            background: #1a1a1a; border-radius: 10px; box-shadow: inset 0 0 20px #000;
        }

        .cell {
            width: 60px; height: 60px; background-color: var(--off-color);
            border-radius: 8px; cursor: pointer; transition: 0.2s; box-sizing: border-box;
        }

        .cell.on { background-color: var(--on-color); box-shadow: 0 0 15px var(--on-color); }
        .cell.solution-hint { border: 4px solid var(--highlight-color); }

        .controls { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; max-width: 600px; }
        
        button, select {
            background-color: var(--text-color); color: var(--bg-color);
            border: none; padding: 12px 20px; font-weight: bold;
            cursor: pointer; border-radius: 5px; text-transform: uppercase;
        }

        button:hover:not(:disabled) { background-color: var(--accent-color); }
        button:disabled { background-color: #444; color: #888; cursor: not-allowed; }

        #btn-start { background-color: var(--on-color); color: #000; width: 100%; font-size: 1.2rem; }
        #btn-reset { background-color: var(--highlight-color); color: white; width: 100%; margin-top: 10px;}

        #timer.warning { color: var(--highlight-color); animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>Bảng Mạch Lỗi</h1>
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/fd/Logo_of_the_Tr%E1%BA%A7n_%C4%90%E1%BA%A1i_Ngh%C4%A9a_High_School_for_the_Gifted.svg" alt="Logo" class="school-logo">
    </div>

    <div class="info-panel">
        <b style="color: var(--accent-color);">🎯 MỤC TIÊU:</b> Tắt toàn bộ bóng đèn trên bảng mạch (đưa tất cả về màu tối).<br>
        <b style="color: var(--on-color);">🕹️ CÁCH CHƠI:</b> Khi bạn nhấn vào một ô, chính nó và <b>4 ô xung quanh</b> (trên, dưới, trái, phải) sẽ bị đảo ngược trạng thái: Đang Sáng thành Tắt và ngược lại.
    </div>

    <div class="stats-board">
        <div>Level: <span id="level-display" style="color: var(--accent-color);">1 (3x3)</span></div>
        <div>⏱️ <span id="timer">02:00</span></div>
        <div>Thao tác: <span id="moves">0</span></div>
    </div>

    <div id="game-board"></div>

    <div class="controls">
        <button id="btn-start">▶️ Bắt đầu trò chơi</button>
        <select id="size-select">
            <option value="3">Level 1: 3x3 (2 Phút)</option>
            <option value="4" disabled id="opt-4">Level 2: 4x4 (3 Phút - Khóa)</option>
            <option value="5" disabled id="opt-5">Level 3: 5x5 (4 Phút - Khóa)</option>
        </select>
        <button id="btn-hint" disabled>Gợi ý (Ô chìa khóa)</button>
        <button id="btn-reset">⚠️ Reset Toàn Bộ</button>
    </div>

    <script>
        const boardEl = document.getElementById('game-board');
        const sizeSelect = document.getElementById('size-select');
        const btnStart = document.getElementById('btn-start');
        const btnHint = document.getElementById('btn-hint');
        const btnReset = document.getElementById('btn-reset');
        const timerEl = document.getElementById('timer');
        const movesEl = document.getElementById('moves');
        const levelDisplay = document.getElementById('level-display');

        let size = 3, board = [], solution = [], moves = 0;
        let timeLeft, timerInterval, isStarted = false, showingHint = false;

        const timeConfig = { "3": 120, "4": 180, "5": 240 };

        function initEmptyBoard() {
            size = parseInt(sizeSelect.value);
            boardEl.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            boardEl.innerHTML = '';
            for (let i = 0; i < size * size; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                boardEl.appendChild(cell);
            }
            timeLeft = timeConfig[size];
            updateTimerUI();
        }

        function toggleCell(r, c) {
            [[0,0], [-1,0], [1,0], [0,-1], [0,1]].forEach(([dr, dc]) => {
                let nr = r + dr, nc = c + dc;
                if (nr >= 0 && nr < size && nc >= 0 && nc < size) board[nr][nc] = !board[nr][nc];
            });
        }

        function setupGame() {
            board = Array(size).fill(0).map(() => Array(size).fill(false));
            solution = Array(size).fill(0).map(() => Array(size).fill(false));
            moves = 0; movesEl.innerText = "0";
            for(let i=0; i < size * 3; i++) {
                let r = Math.floor(Math.random() * size), c = Math.floor(Math.random() * size);
                toggleCell(r, c);
                solution[r][c] = !solution[r][c];
            }
            render();
        }

        function render() {
            boardEl.innerHTML = '';
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    const cell = document.createElement('div');
                    cell.className = `cell ${board[r][c] ? 'on' : ''} ${showingHint && solution[r][c] ? 'solution-hint' : ''}`;
                    cell.onclick = () => {
                        if(!isStarted) return;
                        toggleCell(r, c);
                        solution[r][c] = !solution[r][c];
                        moves++; movesEl.innerText = moves;
                        render(); checkWin();
                    };
                    boardEl.appendChild(cell);
                }
            }
        }

        function updateTimerUI() {
            let m = Math.floor(timeLeft/60), s = timeLeft%60;
            timerEl.innerText = `${m}:${s < 10 ? '0'+s : s}`;
            timerEl.classList.toggle('warning', timeLeft < 20);
        }

        function checkWin() {
            if (board.every(row => row.every(cell => !cell))) {
                clearInterval(timerInterval);
                isStarted = false; btnStart.disabled = false; sizeSelect.disabled = false;
                btnHint.disabled = true; showingHint = false;
                alert("Mạch đã được sửa! Level tiếp theo đã sẵn sàng.");
                if (size < 5) {
                    const nextSize = size + 1;
                    const opt = document.getElementById(`opt-${nextSize}`);
                    opt.disabled = false;
                    opt.innerText = `Level ${nextSize-2}: ${nextSize}x${nextSize} (${timeConfig[nextSize]/60} Phút)`;
                }
            }
        }

        btnStart.onclick = () => {
            isStarted = true; btnStart.disabled = true; sizeSelect.disabled = true; btnHint.disabled = false;
            initEmptyBoard(); setupGame();
            timerInterval = setInterval(() => {
                timeLeft--; updateTimerUI();
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert("Hết thời gian! Bảng mạch sẽ reset về Level 1.");
                    resetAll();
                }
            }, 1000);
        };

        function resetAll() {
            clearInterval(timerInterval);
            isStarted = false; btnStart.disabled = false; sizeSelect.disabled = false;
            btnHint.disabled = true; showingHint = false;
            
            document.getElementById('opt-4').disabled = true;
            document.getElementById('opt-4').innerText = "Level 2: 4x4 (3 Phút - Khóa)";
            document.getElementById('opt-5').disabled = true;
            document.getElementById('opt-5').innerText = "Level 3: 5x5 (4 Phút - Khóa)";
            
            sizeSelect.value = "3";
            levelDisplay.innerText = "1 (3x3)";
            initEmptyBoard();
            moves = 0; movesEl.innerText = "0";
        }

        btnReset.onclick = () => {
            if(confirm("Xóa tiến trình và khóa lại các Level cao?")) resetAll();
        };

        sizeSelect.onchange = () => {
            size = parseInt(sizeSelect.value);
            levelDisplay.innerText = `${size-2} (${size}x${size})`;
            initEmptyBoard();
        };

        btnHint.onclick = () => { showingHint = !showingHint; render(); };

        initEmptyBoard();
    </script>
</body>
</html>
